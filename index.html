    <link href="https://cdn.jsdelivr.net/npm/@fontsource/montserrat/800.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Clarity & Precision Palette - Modo Claro Minimalista */
            --primary: #3525cd;
            --primary-container: #4f46e5;
            --on-primary: #ffffff;
            --on-primary-container: #dad7ff;
            --secondary: #515f74;
            --on-secondary: #ffffff;
            --secondary-container: #d5e3fd;
            --tertiary: #7e3000;
            --on-tertiary: #ffffff;
            --tertiary-container: #a44100;
            --on-tertiary-container: #ffd2be;
            
            /* Surfaces */
            --bg-primary: #f7f9fb;
            --bg-secondary: #f2f4f6;
            --bg-tertiary: #eceef0;
            --surface-container: #e6e8ea;
            --surface-container-high: #e0e3e5;
            --white: #ffffff;
            
            /* Text Colors */
            --text-primary: #191c1e;
            --text-secondary: #464555;
            --text-muted: #777587;
            --outline: #c7c4d8;
            
            /* Error */
            --error: #ba1a1a;
            --error-container: #ffdad6;
            
            /* Typography */
            --font-main: 'Inter', sans-serif;
            
            /* Spacing */
            --spacing-xs: 4px;
            --spacing-sm: 8px;
            --spacing-md: 16px;
            --spacing-lg: 24px;
            --spacing-xl: 40px;
            --spacing-xxl: 64px;
            
            /* Border Radius */
            --radius-sm: 0.125rem;
            --radius-md: 0.375rem;
            --radius-lg: 0.5rem;
            --radius-xl: 0.75rem;
            --radius-full: 9999px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            line-height: 1.6;
            color: var(--text-primary);
            background-color: var(--bg-primary);
            overflow-x: hidden;
        }

        html {
            scroll-behavior: smooth;
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 var(--spacing-lg);
        }

        /* TYPOGRAPHY */
        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-main);
            font-weight: 600;
            line-height: 1.2;
            letter-spacing: -0.02em;
            color: var(--text-primary);
        }

        h1 {
            font-size: 48px;
        }

        h2 {
            font-size: 30px;
        }

        h3 {
            font-size: 24px;
            font-weight: 500;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: var(--text-secondary);
        }

        .text-lg {
            font-size: 18px;
        }

        .text-muted {
            color: var(--text-muted);
        }

        /* HEADER */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(247, 249, 251, 0.95);
            backdrop-filter: blur(10px);
            z-index: 1000;
            border-bottom: 1px solid var(--outline);
            transition: all 0.3s ease;
        }

        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--spacing-md) 0;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            text-decoration: none;
            letter-spacing: -0.02em;
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: var(--spacing-xl);
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.02em;
            transition: color 0.3s ease;
            position: relative;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--primary);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* HERO */
        .hero {
            padding: calc(var(--spacing-xxl) * 2) 0 var(--spacing-xxl);
            background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xxl);
            align-items: center;
        }

        .hero-content h1 {
            margin-bottom: var(--spacing-lg);
            color: var(--text-primary);
        }

        .hero-content p {
            font-size: 18px;
            margin-bottom: var(--spacing-xl);
            color: var(--text-secondary);
        }

        /* BUTTONS */
        .btn {
            display: inline-block;
            padding: var(--spacing-md) var(--spacing-xl);
            border-radius: var(--radius-md);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            letter-spacing: 0.02em;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--on-primary);
            border: 1px solid var(--primary);
        }

        .btn-primary:hover {
            background: var(--primary-container);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.15);
        }

        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 1px solid var(--surface-container-high);
        }

        .btn-secondary:hover {
            background: var(--bg-secondary);
            border-color: var(--primary);
            color: var(--primary);
        }

        .hero-buttons {
            display: flex;
            gap: var(--spacing-md);
            flex-wrap: wrap;
        }

        /* ABOUT */
        .about {
            padding: var(--spacing-xxl) 0;
            background: var(--white);
        }

        .about-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xxl);
            align-items: center;
        }

        .about-content h3 {
            color: var(--primary);
            margin-bottom: var(--spacing-lg);
        }

        .about-content p {
            margin-bottom: var(--spacing-md);
        }

        .about-image {
            background: linear-gradient(135deg, var(--primary-container) 0%, var(--secondary-container) 100%);
            border-radius: var(--radius-lg);
            height: 400px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--outline);
        }

        /* PRODUCTS */
        .products {
            padding: var(--spacing-xxl) 0;
            background: var(--bg-secondary);
        }

        .section-header {
            text-align: center;
            margin-bottom: var(--spacing-xxl);
        }

        .section-header h2 {
            margin-bottom: var(--spacing-md);
        }

        .section-header p {
            max-width: 600px;
            margin: 0 auto;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: var(--spacing-lg);
        }

        .product-card {
            background: var(--white);
            border: 1px solid var(--outline);
            border-radius: var(--radius-lg);
            padding: var(--spacing-xl);
            transition: all 0.3s ease;
        }

        .product-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            border-color: var(--primary);
        }

        .product-icon {
            width: 60px;
            height: 60px;
            background: var(--primary-container);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: var(--spacing-lg);
            color: var(--on-primary);
            font-size: 24px;
        }

        .product-card h3 {
            margin-bottom: var(--spacing-md);
            color: var(--text-primary);
        }

        .product-card p {
            color: var(--text-secondary);
            margin-bottom: var(--spacing-lg);
        }

        .product-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: var(--spacing-xs);
        }

        .product-link:hover {
            text-decoration: underline;
        }

        /* CONTACT */
        .contact {
            padding: var(--spacing-xxl) 0;
            background: var(--white);
        }

        .contact-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--spacing-xxl);
        }

        .contact-info h3 {
            color: var(--primary);
            margin-bottom: var(--spacing-lg);
        }

        .contact-info p {
            margin-bottom: var(--spacing-lg);
        }

        .contact-details {
            margin-top: var(--spacing-xl);
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-md);
            color: var(--text-secondary);
        }

        .contact-form {
            background: var(--bg-secondary);
            padding: var(--spacing-xl);
            border-radius: var(--radius-lg);
            border: 1px solid var(--outline);
        }

        .form-group {
            margin-bottom: var(--spacing-lg);
        }

        .form-group label {
            display: block;
            margin-bottom: var(--spacing-sm);
            font-weight: 500;
            font-size: 14px;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: var(--spacing-md);
            border: 1px solid var(--outline);
            border-radius: var(--radius-md);
            font-family: var(--font-main);
            font-size: 16px;
            background: var(--white);
            color: var(--text-primary);
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 120px;
        }

        .form-group small {
            color: var(--text-muted);
            font-size: 12px;
            margin-top: var(--spacing-xs);
            display: block;
        }

        /* FOOTER */
        footer {
            background: var(--bg-primary);
            padding: var(--spacing-xxl) 0 var(--spacing-xl);
            border-top: 1px solid var(--outline);
        }

        .footer-grid {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr 1fr;
            gap: var(--spacing-xl);
            margin-bottom: var(--spacing-xl);
        }

        .footer-col h4 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: var(--spacing-lg);
            color: var(--text-primary);
        }

        .footer-col ul {
            list-style: none;
        }

        .footer-col ul li {
            margin-bottom: var(--spacing-sm);
        }

        .footer-col ul li a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .footer-col ul li a:hover {
            color: var(--primary);
        }

        .footer-bottom {
            text-align: center;
            padding-top: var(--spacing-xl);
            border-top: 1px solid var(--outline);
            color: var(--text-muted);
            font-size: 14px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .hero-grid,
            .about-grid,
            .contact-grid,
            .footer-grid {
                grid-template-columns: 1fr;
            }

            .nav-links {
                display: none;
            }

            h1 {
                font-size: 36px;
            }

            h2 {
                font-size: 24px;
            }

            .hero {
                padding: var(--spacing-xxl) 0;
            }

            .hero-buttons {
                flex-direction: column;
            }

            .btn {
                width: 100%;
                text-align: center;
            }
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-on-scroll {
            opacity: 0;
            animation: fadeInUp 0.6s ease forwards;
        }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.2s; }
        .delay-3 { animation-delay: 0.3s; }
</head>

    <!-- TOAST -->
    <div class="toast" id="toast">✓ Mensaje enviado correctamente. ¡Te contactaremos pronto!</div>

    <script>
        (function () {
            // Navbar scroll effect
            var navbar = document.getElementById('navbar');
            window.addEventListener('scroll', function () {
                if (window.scrollY > 50) {
                    navbar.classList.add('scrolled');
                } else {
                    navbar.classList.remove('scrolled');
                }
            });

            // Hamburger menu
            var hamburger = document.getElementById('hamburger');
            var navLinks = document.getElementById('navLinks');
            hamburger.addEventListener('click', function () {
                hamburger.classList.toggle('active');
                navLinks.classList.toggle('open');
            });

            // Close mobile menu on link click
            document.querySelectorAll('.nav-links a').forEach(function (link) {
                link.addEventListener('click', function () {
                    hamburger.classList.remove('active');
                    navLinks.classList.remove('open');
                });
            });

            // Scroll reveal
            var reveals = document.querySelectorAll('.reveal');
            var revealObserver = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('visible');
                        revealObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.15, rootMargin: '0px 0px -40px 0px' });

            reveals.forEach(function (el) {
                revealObserver.observe(el);
            });

            // Counter animation
            var counters = document.querySelectorAll('.hero-stat-num');
            var counterStarted = false;

            function animateCounters() {
                if (counterStarted) return;
                counterStarted = true;
                counters.forEach(function (counter) {
                    var target = parseInt(counter.getAttribute('data-count'));
                    var duration = 2000;
                    var startTime = null;

                    function updateCounter(timestamp) {
                        if (!startTime) startTime = timestamp;
                        var progress = Math.min((timestamp - startTime) / duration, 1);
                        var eased = 1 - Math.pow(1 - progress, 3);
                        var current = Math.floor(eased * target);
                        counter.textContent = current + '+';
                        if (progress < 1) {
                            requestAnimationFrame(updateCounter);
                        } else {
                            counter.textContent = target + '+';
                        }
                    }
                    requestAnimationFrame(updateCounter);
                });
            }

            var statsObserver = new IntersectionObserver(function (entries) {
                entries.forEach(function (entry) {
                    if (entry.isIntersecting) {
                        animateCounters();
                        statsObserver.unobserve(entry.target);
                    }
                });
            }, { threshold: 0.5 });

            var statsSection = document.querySelector('.hero-stats');
            if (statsSection) {
                statsObserver.observe(statsSection);
            }

            // Form submission
            var contactForm = document.getElementById('contactForm');
            // Nota: Asegúrate de tener un elemento con id="toast" en tu HTML o elimina las líneas del toast si no lo usas.
            var toast = document.getElementById('toast');

            // CONFIGURACIÓN: Pon aquí tu número de WhatsApp con código de país (ej: 56233950 para Chile)
            // SIN el símbolo '+' ni espacios.
            const MY_WHATSAPP_NUMBER = "56233950";

            contactForm.addEventListener('submit', function (e) {
                e.preventDefault();

                // 1. Obtener valores
                var nombreVal = document.getElementById('nombre').value.trim();
                var empresaVal = document.getElementById('empresa').value.trim();
                var emailVal = document.getElementById('email').value.trim();
                var telefonoVal = document.getElementById('telefono').value.trim();
                var servicioVal = document.getElementById('servicio').value;
                var mensajeVal = document.getElementById('mensaje').value.trim();

                // Validación básica
                if (!nombreVal || !emailVal || !mensajeVal) {
                    alert("Por favor completa los campos obligatorios.");
                    return;
                }

                // 2. Construir el mensaje
                // Usamos \n para saltos de línea y encodeURIComponent para que sea válido en una URL
                var textoMensaje = `*Nuevo Mensaje desde la Web*\n\n`;
                textoMensaje += `*Nombre:* ${nombreVal}\n`;
                
                if (empresaVal) {
                    textoMensaje += `*Empresa:* ${empresaVal}\n`;
                }
                
                textoMensaje += `*Email:* ${emailVal}\n`;
                
                if (telefonoVal) {
                    textoMensaje += `*Teléfono:* ${telefonoVal}\n`;
                }
                
                // Mapear el valor del select a un nombre legible si es necesario
                var productoNombre = servicioVal ? servicioVal : "No especificado";
                // Opcional: Mejorar el nombre del producto para que se lea mejor
                if (productoNombre === 'ventas-express-web') productoNombre = 'Ventas-Express Web';
                if (productoNombre === 'ventas-express-mobil') productoNombre = 'Ventas-Express Android';
                
                textoMensaje += `*Servicio de Interés:* ${productoNombre}\n\n`;
                textoMensaje += `*Mensaje:*\n${mensajeVal}`;

                // 3. Codificar el mensaje para URL
                var whatsappUrl = `https://wa.me/${MY_WHATSAPP_NUMBER}?text=${encodeURIComponent(textoMensaje)}`;

                // 4. Feedback visual (Botón cargando)
                var submitBtn = contactForm.querySelector('.form-submit');
                var originalText = submitBtn.textContent;
                submitBtn.textContent = 'Abriendo WhatsApp...';
                submitBtn.disabled = true;

                // 5. Abrir WhatsApp
                // Usamos un pequeño timeout para que el usuario vea el cambio en el botón
                setTimeout(function () {
                    window.open(whatsappUrl, '_blank');

                    // Resetear formulario y botón
                    contactForm.reset();
                    submitBtn.textContent = originalText;
                    submitBtn.disabled = false;

                    // Mostrar toast si existe
                    if (toast) {
                        toast.classList.add('show');
                        setTimeout(function () {
                            toast.classList.remove('show');
                        }, 4000);
                    }
                }, 800);
            });

            // Smooth scroll for anchor links
            document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
                anchor.addEventListener('click', function (e) {
                    var targetId = this.getAttribute('href');
                    if (targetId === '#') return;
                    var targetEl = document.querySelector(targetId);
                    if (targetEl) {
                        e.preventDefault();
                        var navHeight = navbar.offsetHeight;
                        var targetPos = targetEl.getBoundingClientRect().top + window.pageYOffset - navHeight;
                        window.scrollTo({ top: targetPos, behavior: 'smooth' });
                    }
                });
            });
        })();
    </script>
